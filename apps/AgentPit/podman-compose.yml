version: "3.8"

# 定义网络 - 实现服务间网络隔离
networks:
  agentpit-network:
    driver: bridge
    name: agentpit-network

# 定义卷 - 持久化日志数据
volumes:
  agentpit-logs:
    name: agentpit-logs

services:
  # 前端服务定义
  agentpit-frontend:
    container_name: agentpit-frontend
    image: agentpit-vue3:latest
    build:
      context: .
      dockerfile: Podmanfile
      target: production

    # 端口映射 - 将容器 80 端口映射到主机 8080 端口
    ports:
      - "8080:80"

    # 卷挂载 - 日志目录持久化存储
    volumes:
      - agentpit-logs:/var/log/nginx

    # 环境变量配置
    environment:
      - NODE_ENV=production
      - TZ=Asia/Shanghai
    env_file:
      - .env.production

    # 资源限制 - 防止资源耗尽
    deploy:
      resources:
        limits:
          memory: 512M  # 内存限制 512MB
          cpus: "0.5"   # CPU 使用率限制为 50%
        reservations:
          memory: 256M  # 保证最低内存 256MB

    # 重启策略 - 除非手动停止，否则自动重启
    restart: unless-stopped

    # 网络配置 - 加入自定义网络实现隔离
    networks:
      - agentpit-network

    # 健康检查配置
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:80/health"]
      interval: 30s       # 检查间隔 30 秒
      timeout: 10s        # 超时时间 10 秒
      retries: 3          # 连续失败 3 次标记为不健康
      start_period: 15s   # 启动后等待 15 秒再开始检查

    # 安全配置 - 以非 root 用户运行
    user: "1000:1000"

    # 只读文件系统（可选增强安全性）
    read_only: true
    tmpfs:
      - /tmp
      - /var/run