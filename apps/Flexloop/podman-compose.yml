version: "3.8"

# ============================================================
# Flexloop Podman Compose 配置文件
# 支持多环境：development / production
# 
# 使用方式：
#   开发环境: podman-compose --profile development up flexloop-dev
#   生产环境: podman-compose --profile production up -d
#   全部服务: podman-compose --profile development --profile production up
# ============================================================

# 定义网络 - 实现服务间网络隔离
networks:
  flexloop-network:
    driver: bridge
    name: flexloop-network

# 定义卷 - 持久化日志数据
volumes:
  flexloop-logs:
    name: flexloop-logs

services:

  # ============================================================
  # 开发环境服务 (Development Profile)
  # 使用 Vite 热重载开发服务器，支持源码实时同步
  # 启动命令: podman-compose --profile development up flexloop-dev
  # ============================================================
  flexloop-dev:
    profiles: ["development"]
    container_name: flexloop-dev

    # 使用 Node.js 20 Alpine 镜像（轻量级，适合开发）
    image: node:20-alpine

    # 工作目录
    working_dir: /app

    # 源码卷挂载 - 实现代码热更新
    volumes:
      - ./:/app                              # 挂载整个项目目录
      - /app/node_modules                    # 排除容器内 node_modules，使用镜像自带的

    # 端口映射 - Vite dev server 默认端口
    ports:
      - "5173:5173"

    # 启动命令 - 运行 Vite 开发服务器
    command: npm run dev

    # 环境变量配置
    environment:
      - NODE_ENV=development
      - TZ=Asia/Shanghai
      - CHOKIDAR_USEPOLLING=true             # 文件监听兼容性（某些文件系统需要）
      - WATCHPACK_POLLING=true                # Webpack/Vite 轮询模式
    env_file:
      - .env.development                      # 从开发环境变量文件加载

    # 资源限制 - 开发环境相对宽松
    deploy:
      resources:
        limits:
          memory: 1G                          # 内存限制 1GB
          cpus: "1.0"                         # CPU 使用率限制为 100%
        reservations:
          memory: 256M                        # 保证最低内存 256MB

    # 交互式终端支持 - 允许进程保持运行并支持交互输入
    stdin_open: true
    tty: true

    # 网络配置
    networks:
      - flexloop-network

    # 重启策略 - 开发环境手动管理为主
    restart: "no"


  # ============================================================
  # 生产环境服务 (Production Profile)
  # 使用构建后的 Nginx 镜像，优化性能和安全性
  # 启动命令: podman-compose --profile production up -d flexloop-frontend
  # ============================================================
  flexloop-frontend:
    profiles: ["production"]
    container_name: flexloop-frontend
    image: flexloop-vue3:latest
    build:
      context: .
      dockerfile: Podmanfile
      target: production

    # 端口映射 - 将容器 80 端口映射到主机 8080 端口
    ports:
      - "8080:80"

    # 卷挂载 - 日志目录持久化存储
    volumes:
      - flexloop-logs:/var/log/nginx

    # 环境变量配置
    environment:
      - NODE_ENV=production
      - TZ=Asia/Shanghai
    env_file:
      - .env.production                       # 生产环境变量文件

    # 日志驱动配置 - 防止日志文件无限增长
    logging:
      driver: json-file
      options:
        max-size: "10m"                       # 单个日志文件最大 10MB
        max-file: "3"                          # 最多保留 3 个日志文件轮转

    # 资源限制 - 防止资源耗尽
    deploy:
      resources:
        limits:
          memory: 512M                        # 内存限制 512MB
          cpus: "0.5"                         # CPU 使用率限制为 50%
        reservations:
          memory: 256M                        # 保证最低内存 256MB

    # 重启策略 - 除非手动停止，否则自动重启
    restart: unless-stopped

    # 优雅停止配置 - 给予服务足够时间完成请求处理
    stop_grace_period: 30s

    # 网络配置 - 加入自定义网络实现隔离
    networks:
      - flexloop-network

    # 健康检查配置
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:80/health"]
      interval: 30s                           # 检查间隔 30 秒
      timeout: 10s                            # 超时时间 10 秒
      retries: 3                              # 连续失败 3 次标记为不健康
      start_period: 15s                       # 启动后等待 15 秒再开始检查

    # 安全配置 - 以非 root 用户运行
    user: "1000:1000"

    # 只读文件系统（增强安全性）
    read_only: true
    tmpfs:
      - /tmp
      - /var/run


  # ============================================================
  # 可选辅助服务模板（已注释，按需启用）
  # 取消注释并添加对应 profile 即可使用
  # ============================================================

  # --- Redis 缓存服务 ---
  # 适用于会话缓存、消息队列等场景
  # 取消注释后添加 profiles: ["production"] 或 ["development"] 即可启用
  #
  # flexloop-redis:
  #   profiles: ["production"]
  #   container_name: flexloop-redis
  #   image: redis:7-alpine
  #   restart: unless-stopped
  #
  #   ports:
  #     - "6379:6379"
  #
  #   volumes:
  #     - redis-data:/data                     # Redis 数据持久化
  #
  #   command: redis-server --appendonly yes    # 开启 AOF 持久化
  #
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 256M
  #         cpus: "0.5"
  #
  #   networks:
  #     - flexloop-network
  #
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 15s
  #     timeout: 5s
  #     retries: 3

  # --- PostgreSQL 数据库服务 ---
  # 适用于需要关系型数据库的场景
  # 取消注释后添加对应 profile 和密码配置即可启用
  #
  # flexloop-db:
  #   profiles: ["production"]
  #   container_name: flexloop-db
  #   image: postgres:16-alpine
  #   restart: unless-stopped
  #
  #   ports:
  #     - "5432:5432"
  #
  #   environment:
  #     POSTGRES_USER: flexloop
  #     POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}   # 建议通过 .env 文件或 secrets 管理
  #     POSTGRES_DB: flexloop_db
  #     TZ: Asia/Shanghai
  #
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data    # 数据持久化
  #
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 512M
  #         cpus: "1.0"
  #
  #   networks:
  #     - flexloop-network
  #
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
  #     interval: 15s
  #     timeout: 5s
  #     retries: 3
  #     start_period: 30s

  # 如需使用上述辅助服务的持久化卷，取消以下定义：
  # volumes:
  #   redis-data:
  #     name: flexloop-redis-data
  #   postgres-data:
  #     name: flexloop-postgres-data
