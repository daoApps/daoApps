# Nginx configuration for DAO Apps - pagent.agentpit.io

# HTTP server - redirect to HTTPS since SSL is enabled
server {
    listen 80;
    server_name pagent.agentpit.io www.pagent.agentpit.io;
    return 301 https://$server_name$request_uri;
}

# HTTPS server configuration - directly serve static files
server {
    listen 443 ssl http2;
    server_name pagent.agentpit.io www.pagent.agentpit.io;

    # SSL configuration
    ssl_certificate     /etc/letsencrypt/live/pagent.agentpit.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pagent.agentpit.io/privkey.pem;

    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Enable HSTS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Serve static files directly from the build directory
    root /var/www/daoapps/current;
    index index.html;

    # HTML5 History API fallback for SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static files cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "OK\n";
    }
}
