# Prometheus configuration for DAO Apps monitoring
# This is an optional configuration for basic monitoring

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'daoapps-node'
    metrics_path: '/metrics'
    scrape_interval: 10s
    static_configs:
      - targets: ['localhost:{{APP_PORT}}']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: {{APP_NAME}}

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['localhost:9100']
